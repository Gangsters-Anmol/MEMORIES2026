<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · MEMORIES2026</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="features/stories.css" />

  <style>
    /* ── CSS Variables (mirrors main site) ───────────────────── */
    :root {
      --bg:           #f9f6f1;
      --bg-alt:       #f0ebe3;
      --surface:      rgba(255,255,255,0.72);
      --surface-hov:  rgba(255,255,255,0.9);
      --border:       rgba(0,0,0,0.08);
      --text:         #1a1613;
      --text-muted:   #7a736b;
      --accent:       #c8a96e;
      --accent-2:     #8b5e3c;
      --shadow:       0 4px 32px rgba(0,0,0,0.08);
      --shadow-lg:    0 12px 60px rgba(0,0,0,0.14);
      --radius:       16px;
      --radius-sm:    8px;
      --glass-blur:   blur(16px);
      --trans:        0.25s ease;
    }
    [data-theme="dark"] {
      --bg:           #0f0d0b;
      --bg-alt:       #1a1713;
      --surface:      rgba(30,26,22,0.85);
      --surface-hov:  rgba(40,35,30,0.95);
      --border:       rgba(255,255,255,0.08);
      --text:         #f0ead8;
      --text-muted:   #9a8f82;
      --accent:       #c8a96e;
      --accent-2:     #e8c88e;
      --shadow:       0 4px 32px rgba(0,0,0,0.4);
      --shadow-lg:    0 12px 60px rgba(0,0,0,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--trans), color var(--trans);
    }

    /* ── NAV ─────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1rem, 4vw, 3rem);
      height: 60px;
      background: var(--surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border);
    }
    .nav__logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .nav__logo span { color: var(--accent); }
    .nav__controls { display: flex; align-items: center; gap: 0.75rem; }
    .nav__back {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: transparent;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--trans);
      text-decoration: none;
    }
    .nav__back:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav__theme-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--trans);
    }
    .nav__theme-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── GLASS PANEL ─────────────────────────────────────────── */
    .glass-panel {
      background: var(--surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── PAGE CONTAINER ──────────────────────────────────────── */
    .profile-page {
      max-width: 860px;
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 4vw, 2rem);
    }

    /* ── LOADING / ERROR ─────────────────────────────────────── */
    .profile-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
      color: var(--text-muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .profile-not-found {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .profile-not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    /* ── PROFILE HEADER CARD ─────────────────────────────────── */
    .profile-header-card {
      padding: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 2rem;
      display: flex;
      gap: clamp(1.5rem, 4vw, 2.5rem);
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* Avatar */
    .profile-avatar-wrap { position: relative; flex-shrink: 0; }
    .profile-avatar {
      width: clamp(80px, 15vw, 110px);
      height: clamp(80px, 15vw, 110px);
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      display: block;
    }
    .profile-avatar-initials {
      width: clamp(80px, 15vw, 110px);
      height: clamp(80px, 15vw, 110px);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 600;
      color: #fff;
      border: 3px solid var(--accent);
    }
    .profile-avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0.3;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.06); opacity: 0.6; }
    }

    /* Info */
    .profile-info { flex: 1; min-width: 200px; }
    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 0.3rem;
      color: var(--text);
    }
    .profile-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .profile-role-badge {
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
    }
    .profile-role-badge--teacher { background: #5b7fa6; }
    .profile-role-badge--parent  { background: #7a6b9e; }
    .profile-role-badge--girl    { background: #c87b8a; }
    .profile-special-badge {
      font-size: 0.85rem;
      background: linear-gradient(135deg,#f5c842,#e8a020);
      padding: 0.18rem 0.55rem;
      border-radius: 50px;
      color: #fff;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }

    /* Stats row */
    .profile-stats {
      display: flex;
      gap: clamp(1rem, 3vw, 2rem);
      margin-bottom: 1.2rem;
    }
    .profile-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform var(--trans);
    }
    .profile-stat:hover { transform: translateY(-2px); }
    .profile-stat__num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }
    .profile-stat__label {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 0.1rem;
    }
    .profile-stat-divider {
      width: 1px;
      height: 30px;
      background: var(--border);
      align-self: center;
    }

    /* Follow Button */
    .profile-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .btn-follow {
      padding: 0.55rem 1.6rem;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      border: 2px solid var(--accent);
      background: var(--accent);
      color: #fff;
      letter-spacing: 0.04em;
    }
    .btn-follow:hover { background: var(--accent-2); border-color: var(--accent-2); transform: translateY(-1px); }
    .btn-follow.following {
      background: transparent;
      color: var(--accent);
    }
    .btn-follow.following:hover {
      background: #e74c3c22;
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .btn-follow[disabled] { opacity: 0.5; cursor: not-allowed; }

    .btn-message {
      padding: 0.55rem 1.2rem;
      border-radius: 50px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    .btn-message:hover { border-color: var(--accent); color: var(--accent); }

    .profile-own-label {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── SECTION TABS ─────────────────────────────────────────── */
    .profile-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .profile-tab {
      padding: 0.7rem 1.4rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      letter-spacing: 0.04em;
      margin-bottom: -1px;
    }
    .profile-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .profile-tab:hover:not(.active) { color: var(--text); }

    /* ── TAB PANELS ──────────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── POSTS GRID ──────────────────────────────────────────── */
    .profile-posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    @media (max-width: 500px) {
      .profile-posts-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .profile-post-tile {
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-alt);
      cursor: pointer;
      border-radius: 4px;
    }
    .profile-post-tile img,
    .profile-post-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .profile-post-tile:hover img,
    .profile-post-tile:hover video { transform: scale(1.06); }

    .profile-post-tile__overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .profile-post-tile:hover .profile-post-tile__overlay { opacity: 1; }
    .profile-post-tile__stat {
      color: #fff;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Text-only post tile */
    .profile-post-tile--text {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
    }
    .profile-post-tile--text p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .posts-grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .posts-grid-empty span {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    /* ── FOLLOWERS / FOLLOWING LISTS ─────────────────────────── */
    .follow-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .follow-list-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .follow-user-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--bg-alt);
      transition: background var(--trans);
      text-decoration: none;
      color: var(--text);
    }
    .follow-user-row:hover { background: var(--surface-hov); }
    .follow-user-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .follow-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .follow-user-name { font-weight: 500; font-size: 0.9rem; }
    .follow-user-role { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }

    /* ── POST DETAIL MODAL ───────────────────────────────────── */
    .post-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

    .post-detail-panel {
      background: var(--bg);
      border-radius: var(--radius);
      max-width: 680px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }

    .post-detail-close {
      position: absolute;
      top: 0.75rem; right: 0.75rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--trans);
      z-index: 10;
    }
    .post-detail-close:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }

    .post-detail-media { width: 100%; border-radius: var(--radius) var(--radius) 0 0; overflow: hidden; max-height: 420px; }
    .post-detail-media img,
    .post-detail-media video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; max-height: 420px; }

    .post-detail-body { padding: 1.5rem; }
    .post-detail-author {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .post-detail-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: #fff;
      font-size: 1rem;
    }
    .post-detail-name { font-weight: 500; font-size: 0.9rem; }
    .post-detail-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
    .post-detail-text {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-detail-reactions {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .reaction-chip {
      padding: 0.25rem 0.6rem;
      border-radius: 50px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      font-size: 0.82rem;
    }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: 'Jost', sans-serif;
      white-space: nowrap;
      z-index: 9999;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── AUTH GATE ───────────────────────────────────────────── */
    .auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.2rem;
      text-align: center;
      padding: 2rem;
    }
    .auth-gate h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--text);
    }
    .auth-gate p { color: var(--text-muted); font-size: 0.9rem; max-width: 300px; }
    .btn-primary {
      padding: 0.65rem 1.8rem;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
    }
    .btn-primary:hover { background: var(--accent-2); transform: translateY(-1px); }

    /* ── STORY RING ON PROFILE AVATAR ───────────────────────── */
    /* Overrides the static .profile-avatar-ring when stories exist */
    .profile-avatar-ring.has-stories {
      background: conic-gradient(
        var(--accent, #c8a96e),
        #e8c88e,
        #f0a060,
        var(--accent, #c8a96e)
      ) !important;
      animation: profile-ring-spin 4s linear infinite !important;
      cursor: pointer;
    }
    .profile-avatar-ring.has-stories-seen {
      background: var(--border, rgba(0,0,0,0.15)) !important;
      animation: none !important;
      cursor: pointer;
    }
    @keyframes profile-ring-spin { to { transform: rotate(360deg); } }

    /* "View Story" button */
    .btn-view-story {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 1rem;
      border-radius: 50px;
      border: 1.5px solid var(--accent, #c8a96e);
      background: transparent;
      color: var(--accent, #c8a96e);
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
    }
    .btn-view-story:hover {
      background: rgba(200,169,110,0.1);
      transform: translateY(-1px);
    }

    /* ── PRESENCE BADGE ──────────────────────────────────────── */
    .profile-presence-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.65rem;
      border-radius: 50px;
      font-size: 0.72rem;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      border: 1px solid transparent;
      vertical-align: middle;
    }
    .profile-presence-badge--online {
      background: rgba(46,204,113,0.1);
      color: #27ae60;
      border-color: rgba(46,204,113,0.25);
    }
    .profile-presence-badge--offline {
      background: var(--bg-alt);
      color: var(--text-muted);
      border-color: var(--border);
    }
    .profile-presence-badge::before {
      content: "";
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .profile-presence-badge--online::before {
      background: #2ecc71;
      animation: presence-pulse 2.2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(46,204,113,0.6);
    }
    .profile-presence-badge--offline::before { background: #bbb; }
    @keyframes presence-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(46,204,113,0.55); }
      60%  { box-shadow: 0 0 0 6px rgba(46,204,113,0); }
      100% { box-shadow: 0 0 0 0   rgba(46,204,113,0); }
    }

    /* ── AVATAR UPLOAD OVERLAY (own profile only) ───────────── */
    .profile-avatar-wrap {
      position: relative; /* ensure overlay is positioned correctly */
    }
    .avatar-edit-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.48);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      opacity: 0;
      cursor: pointer;
      transition: opacity 0.22s ease;
      z-index: 4;
    }
    .profile-avatar-wrap:hover .avatar-edit-overlay { opacity: 1; }
    /* Also show on touch devices on tap */
    .profile-avatar-wrap.touch-active .avatar-edit-overlay { opacity: 1; }
    .avatar-edit-overlay__icon  { font-size: 1.4rem; line-height: 1; }
    .avatar-edit-overlay__label {
      font-family: 'Jost', sans-serif;
      font-size: 0.58rem;
      color: #fff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Edit photo button (shown below avatar on own profile) */
    .btn-edit-photo {
      padding: 0.45rem 1.1rem;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .btn-edit-photo:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.06);
    }

    /* Uploading spinner ring around avatar */
    .avatar-uploading-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      animation: av-spin 0.85s linear infinite;
      pointer-events: none;
      z-index: 5;
    }
    @keyframes av-spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 540px) {
      .profile-header-card { flex-direction: column; align-items: center; text-align: center; }
      .profile-meta { justify-content: center; }
      .profile-stats { justify-content: center; }
      .profile-actions { justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav__logo">Memo<span>ries</span></a>
    <div class="nav__controls">
      <a href="index.html" class="nav__back">← Back</a>
      <button class="nav__theme-btn" id="themeToggle" title="Toggle theme">◐</button>
    </div>
  </nav>

  <!-- MAIN CONTENT (injected by JS) -->
  <main class="profile-page" id="profilePage">
    <div class="profile-loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading profile…</p>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="profileToast"></div>

  <!-- ──────────────────────────────────────────────────────────
       SCRIPTS (ES Modules)
  ─────────────────────────────────────────────────────────── -->
  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
                                from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, collection, query,
      where, orderBy, getDocs, onSnapshot,
      updateDoc, increment, setDoc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    /* ── Firebase init ──────────────────────────────────────── */
    const firebaseConfig = {
      apiKey:            "AIzaSyBfM7Wn6HbkgfUf0eePFbsxN7bJv_fersM",
      authDomain:        "gangster-s-2025-26.firebaseapp.com",
      projectId:         "gangster-s-2025-26",
      storageBucket:     "gangster-s-2025-26.firebasestorage.app",
      messagingSenderId: "725698254504",
      appId:             "1:725698254504:web:fa7e271aab3dd40c6ed49d",
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ── URL params ─────────────────────────────────────────── */
    const params     = new URLSearchParams(location.search);
    const targetUid  = params.get("user");

    /* ── State ──────────────────────────────────────────────── */
    let currentUser    = null;
    let currentProfile = null;
    let targetProfile  = null;
    let isFollowing    = false;

    /* ── Theme ──────────────────────────────────────────────── */
    const saved = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    /* ── Toast ──────────────────────────────────────────────── */
    function showToast(msg, ms = 3000) {
      const el = document.getElementById("profileToast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove("show"), ms);
    }

    /* ── Escape HTML ─────────────────────────────────────────── */
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── Auth observer ──────────────────────────────────────── */
    onAuthStateChanged(auth, async user => {
      currentUser = user;
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) currentProfile = snap.data();
      }
      await boot();
    });

    /* ── Main boot ──────────────────────────────────────────── */
    async function boot() {
      const page = document.getElementById("profilePage");

      /* No UID in URL → show error */
      if (!targetUid) {
        page.innerHTML = `
          <div class="profile-not-found">
            <h2>No profile specified</h2>
            <p>Use <code>profile.html?user=UID</code> to view a profile.</p>
          </div>`;
        return;
      }

      /* Not logged in → auth gate */
      if (!currentUser) {
        page.innerHTML = `
          <div class="auth-gate">
            <h2>🔒 Sign in to view profiles</h2>
            <p>You need to be logged in to view classmate profiles.</p>
            <button class="btn-primary" onclick="location.href='index.html'">Go to Home & Login</button>
          </div>`;
        return;
      }

      /* FIX: All Firestore calls wrapped in try/catch.
         Without this, any network or permissions error silently rejects the
         async function, leaving the "Loading profile…" spinner forever. */
      try {
        /* Load target user */
        const snap = await getDoc(doc(db, "users", targetUid));
        if (!snap.exists() || !snap.data().profileComplete) {
          page.innerHTML = `
            <div class="profile-not-found">
              <h2>Profile not found</h2>
              <p>This user doesn't exist or hasn't completed their profile.</p>
              <a href="index.html" style="color:var(--accent)">← Back to home</a>
            </div>`;
          return;
        }

        targetProfile = snap.data();

        /* Check follow status */
        const followId   = `${currentUser.uid}_${targetUid}`;
        const followSnap = await getDoc(doc(db, "follows", followId));
        isFollowing = followSnap.exists();

        /* Render */
        renderProfile(page);

      } catch (err) {
        /* Replace the infinite spinner with a real error + retry button */
        console.error("Profile load error:", err);
        page.innerHTML = `
          <div class="profile-not-found">
            <h2>⚠️ Failed to load profile</h2>
            <p style="color:var(--text-muted);font-size:.9rem;margin-top:.5rem;">
              ${err.message || "Could not connect. Check your internet and try again."}
            </p>
            <button class="btn-primary" onclick="location.reload()"
              style="margin-top:1.2rem">↻ Retry</button>
            <a href="index.html" style="color:var(--accent);display:block;margin-top:.75rem">
              ← Back to home
            </a>
          </div>`;
      }
    }

    /* ── Render full profile ────────────────────────────────── */
    function renderProfile(page) {
      const u        = targetProfile;
      const isOwn    = currentUser?.uid === targetUid;
      const initials = (u.name || "?")[0].toUpperCase();

      const followersCount = u.followersCount || 0;
      const followingCount = u.followingCount || 0;
      const postsCount     = u.postsCount     || 0;

      const roleBadgeClass = `profile-role-badge--${u.role || ""}`;

      page.innerHTML = `
        <!-- Profile Header -->
        <div class="glass-panel profile-header-card" id="profileHeaderCard">
          <div class="profile-avatar-wrap" id="profileAvatarWrap">
            <div class="profile-avatar-ring" id="profileStoryRing"></div>
            ${u.photoURL
              ? `<img class="profile-avatar" id="profileAvatarImg" src="${esc(u.photoURL)}" alt="${esc(u.name)}" />`
              : `<div class="profile-avatar-initials" id="profileAvatarInitials">${initials}</div>`
            }
            ${isOwn ? `
            <div class="avatar-edit-overlay" id="avatarEditOverlay" title="Change photo">
              <span class="avatar-edit-overlay__icon">📷</span>
              <span class="avatar-edit-overlay__label">Change</span>
            </div>` : ""}
          </div>
          <div class="profile-info">
            <h1 class="profile-name">${esc(u.name)}</h1>
            <div class="profile-meta">
              <span class="profile-role-badge ${roleBadgeClass}">${esc(u.role || "member")}</span>
              ${u.specialUser ? `<span class="profile-special-badge">⭐ Special</span>` : ""}
              ${u.admin       ? `<span class="profile-special-badge" style="background:linear-gradient(135deg,#5b9ef0,#3a6bc8)">⚡ Admin</span>` : ""}
              ${u.moderator   ? `<span class="profile-special-badge" style="background:linear-gradient(135deg,#6bcf8a,#3aa860)">🛡 Mod</span>` : ""}
              <span id="profilePresenceBadge"></span>
            </div>
            <div class="profile-stats">
              <div class="profile-stat" id="statPosts">
                <span class="profile-stat__num" id="postsCountEl">${postsCount}</span>
                <span class="profile-stat__label">Posts</span>
              </div>
              <div class="profile-stat-divider"></div>
              <div class="profile-stat" id="statFollowers" title="View followers">
                <span class="profile-stat__num" id="followersCountEl">${followersCount}</span>
                <span class="profile-stat__label">Followers</span>
              </div>
              <div class="profile-stat-divider"></div>
              <div class="profile-stat" id="statFollowing" title="View following">
                <span class="profile-stat__num" id="followingCountEl">${followingCount}</span>
                <span class="profile-stat__label">Following</span>
              </div>
            </div>
            <div class="profile-actions" id="profileActions">
              ${isOwn
                ? `<span class="profile-own-label">✦ This is your profile</span>
                   <button class="btn-edit-photo" id="editPhotoBtn">📷 Edit Photo</button>`
                : `<button class="btn-follow ${isFollowing ? "following" : ""}" id="followBtn">
                     ${isFollowing ? "✓ Following" : "+ Follow"}
                   </button>
                   <button class="btn-message" id="msgBtn">💬 Message</button>
                   <span id="viewStoryBtnWrap"></span>`
              }
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
          <button class="profile-tab active" data-tab="posts">Posts</button>
          <button class="profile-tab" data-tab="followers">Followers</button>
          <button class="profile-tab" data-tab="following">Following</button>
        </div>

        <!-- Posts Tab -->
        <div class="tab-panel active" id="tab-posts">
          <div class="profile-posts-grid" id="postsGrid">
            <div class="posts-grid-empty">
              <span>⏳</span>
              Loading posts…
            </div>
          </div>
        </div>

        <!-- Followers Tab -->
        <div class="tab-panel" id="tab-followers">
          <div class="follow-list" id="followersList">
            <div class="follow-list-empty">Loading…</div>
          </div>
        </div>

        <!-- Following Tab -->
        <div class="tab-panel" id="tab-following">
          <div class="follow-list" id="followingList">
            <div class="follow-list-empty">Loading…</div>
          </div>
        </div>
      `;

      /* Bind tab switching */
      document.querySelectorAll(".profile-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".profile-tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
          tab.classList.add("active");
          const panel = document.getElementById(`tab-${tab.dataset.tab}`);
          if (panel) panel.classList.add("active");
          if (tab.dataset.tab === "followers") loadFollowersList();
          if (tab.dataset.tab === "following") loadFollowingList();
        });
      });

      /* Bind stat click → open tab */
      document.getElementById("statFollowers")?.addEventListener("click", () => {
        document.querySelector('[data-tab="followers"]')?.click();
      });
      document.getElementById("statFollowing")?.addEventListener("click", () => {
        document.querySelector('[data-tab="following"]')?.click();
      });

      /* Bind follow button */
      document.getElementById("followBtn")?.addEventListener("click", toggleFollow);

      /* Bind message button → redirect to home chat */
      document.getElementById("msgBtn")?.addEventListener("click", () => {
        localStorage.setItem("openDMWith", JSON.stringify({ uid: targetUid, name: u.name, role: u.role }));
        location.href = "index.html#chat";
      });

      /* ── Avatar upload (own profile only) ───────────────── */
      if (isOwn) {
        const _openUpload = () => _showAvatarModal();
        document.getElementById("avatarEditOverlay")?.addEventListener("click", _openUpload);
        document.getElementById("editPhotoBtn")?.addEventListener("click", _openUpload);

        /* Touch support — tap avatar to reveal overlay */
        const avatarWrap = document.getElementById("profileAvatarWrap");
        avatarWrap?.addEventListener("touchstart", () => {
          avatarWrap.classList.toggle("touch-active");
        }, { passive: true });

        /* Live-listen to own user doc so photo updates instantly */
        const { onSnapshot: _snap, doc: _doc } = await import(
          "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
        );
        _snap(_doc(db, "users", currentUser.uid), snap => {
          if (!snap.exists()) return;
          const newURL = snap.data().photoURL || null;
          _refreshAvatarUI(newURL, u.name);
        });
      }

      /* Load posts */
      loadUserPosts();

      /* ── Presence badge ──────────────────────────────────── */
      _loadPresenceBadge();

      /* ── Story ring ──────────────────────────────────────── */
      _loadStoryRing();
    }

    /* ── Load user posts ─────────────────────────────────────── */
    async function loadUserPosts() {
      const grid = document.getElementById("postsGrid");
      if (!grid) return;

      try {
        const q    = query(
          collection(db, "posts"),
          where("authorId", "==", targetUid),
          orderBy("timestamp", "desc")
        );
        const snap = await getDocs(q);

        /* Update post count */
        document.getElementById("postsCountEl").textContent = snap.size;

        /* Update Firestore count if owner */
        if (currentUser?.uid === targetUid && (targetProfile.postsCount ?? -1) !== snap.size) {
          updateDoc(doc(db, "users", targetUid), { postsCount: snap.size }).catch(() => {});
        }

        grid.innerHTML = "";

        if (snap.empty) {
          grid.innerHTML = `
            <div class="posts-grid-empty">
              <span>📭</span>
              No posts yet
            </div>`;
          return;
        }

        snap.forEach(d => {
          const data  = d.data();

          /* Skip private posts unless own profile */
          if (data.privacy === "private" && currentUser?.uid !== targetUid && !currentProfile?.admin) return;

          const tile  = document.createElement("div");
          tile.className = "profile-post-tile";

          /* Reaction count */
          let reactionCount = 0;
          if (data.reactions) {
            Object.values(data.reactions).forEach(arr => { if (Array.isArray(arr)) reactionCount += arr.length; });
          }

          if (data.mediaItems && data.mediaItems.length > 0) {
            const first = data.mediaItems[0];
            if (first.type === "video") {
              tile.innerHTML = `
                <video src="${esc(first.url)}" preload="metadata" muted></video>
                <div class="profile-post-tile__overlay">
                  <span class="profile-post-tile__stat">❤️ ${reactionCount}</span>
                  <span class="profile-post-tile__stat">💬 ${data.commentCount || 0}</span>
                </div>`;
            } else {
              tile.innerHTML = `
                <img src="${esc(first.url)}" alt="Post" loading="lazy" />
                <div class="profile-post-tile__overlay">
                  <span class="profile-post-tile__stat">❤️ ${reactionCount}</span>
                  <span class="profile-post-tile__stat">💬 ${data.commentCount || 0}</span>
                </div>`;
            }
          } else {
            tile.classList.add("profile-post-tile--text");
            tile.innerHTML = `
              <p>${esc(data.content || "")}</p>
              <div class="profile-post-tile__overlay">
                <span class="profile-post-tile__stat">❤️ ${reactionCount}</span>
                <span class="profile-post-tile__stat">💬 ${data.commentCount || 0}</span>
              </div>`;
          }

          tile.addEventListener("click", () => openPostDetail(d.id, data));
          grid.appendChild(tile);
        });

      } catch (err) {
        console.error("loadUserPosts:", err);
        grid.innerHTML = `<div class="posts-grid-empty"><span>⚠️</span>Failed to load posts.</div>`;
      }
    }

    /* ── Presence badge on profile page ─────────────────────── */
    function _loadPresenceBadge() {
      const badgeEl = document.getElementById("profilePresenceBadge");
      if (!badgeEl || !targetUid) return;

      /* Don't show presence on own profile */
      if (currentUser?.uid === targetUid) return;

      /* Helper: render the badge */
      function _render(data) {
        const OFFLINE_THRESHOLD = 120_000;
        const online = data.online &&
          ((Date.now() - (data.lastSeen?.toDate?.()?.getTime?.() || 0)) < OFFLINE_THRESHOLD);
        const lastSeen = data.lastSeen?.toDate?.() || null;

        let label = "Offline";
        if (online) {
          label = "Active now";
        } else if (lastSeen) {
          const diff = Math.floor((Date.now() - lastSeen.getTime()) / 1000);
          if (diff < 60)    label = "Last seen just now";
          else if (diff < 3600)  label = `Last seen ${Math.floor(diff/60)}m ago`;
          else if (diff < 86400) label = `Last seen ${Math.floor(diff/3600)}h ago`;
          else label = `Last seen ${lastSeen.toLocaleDateString("en-IN", { day:"numeric", month:"short" })}`;
        }

        badgeEl.innerHTML = `
          <span class="profile-presence-badge profile-presence-badge--${online ? "online" : "offline"}">
            ${label}
          </span>`;
      }

      /* Initial render */
      getDoc(doc(db, "users", targetUid)).then(snap => {
        if (snap.exists()) _render(snap.data());
      }).catch(() => {});

      /* Live updates */
      onSnapshot(doc(db, "users", targetUid), snap => {
        if (snap.exists()) _render(snap.data());
      }, () => {});
    }

    /* ── Post detail modal ───────────────────────────────────── */
    function openPostDetail(id, data) {
      document.getElementById("postDetailOverlay")?.remove();

      const time = data.timestamp?.toDate
        ? data.timestamp.toDate().toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" })
        : "";

      let mediaHTML = "";
      if (data.mediaItems && data.mediaItems.length > 0) {
        const m = data.mediaItems[0];
        mediaHTML = `<div class="post-detail-media">
          ${m.type === "video"
            ? `<video src="${esc(m.url)}" controls preload="metadata"></video>`
            : `<img src="${esc(m.url)}" alt="Post media" />`
          }
        </div>`;
      }

      let reactionsHTML = "";
      if (data.reactions) {
        Object.entries(data.reactions).forEach(([emoji, users]) => {
          if (Array.isArray(users) && users.length) {
            reactionsHTML += `<span class="reaction-chip">${emoji} ${users.length}</span>`;
          }
        });
      }

      const overlay = document.createElement("div");
      overlay.id = "postDetailOverlay";
      overlay.className = "post-detail-overlay";
      overlay.innerHTML = `
        <div class="post-detail-panel glass-panel">
          <button class="post-detail-close" id="closePostDetail">✕</button>
          ${mediaHTML}
          <div class="post-detail-body">
            <div class="post-detail-author">
              <div class="post-detail-avatar">${(data.authorName||"?")[0].toUpperCase()}</div>
              <div>
                <div class="post-detail-name">${esc(data.authorName)}</div>
                <div class="post-detail-time">${time}</div>
              </div>
            </div>
            ${data.content ? `<p class="post-detail-text">${esc(data.content)}</p>` : ""}
            ${reactionsHTML ? `<div class="post-detail-reactions">${reactionsHTML}</div>` : ""}
          </div>
        </div>`;

      document.body.appendChild(overlay);
      document.getElementById("closePostDetail").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
    }

    /* ── Follow / Unfollow ───────────────────────────────────── */
    async function toggleFollow() {
      if (!currentUser || !targetUid || currentUser.uid === targetUid) return;
      const btn      = document.getElementById("followBtn");
      btn.disabled   = true;
      const followId = `${currentUser.uid}_${targetUid}`;
      const followRef    = doc(db, "follows", followId);
      const targetRef    = doc(db, "users", targetUid);
      const currentRef   = doc(db, "users", currentUser.uid);

      try {
        if (isFollowing) {
          /* Unfollow */
          await deleteDoc(followRef);
          await updateDoc(targetRef,   { followersCount: increment(-1) });
          await updateDoc(currentRef,  { followingCount: increment(-1) });
          isFollowing = false;
          btn.textContent = "+ Follow";
          btn.classList.remove("following");
          const el = document.getElementById("followersCountEl");
          if (el) el.textContent = Math.max(0, parseInt(el.textContent) - 1);
          showToast(`Unfollowed ${targetProfile.name}`);
        } else {
          /* Follow */
          await setDoc(followRef, {
            followerId:  currentUser.uid,
            followingId: targetUid,
            createdAt:   serverTimestamp()
          });
          await updateDoc(targetRef,  { followersCount: increment(1) });
          await updateDoc(currentRef, { followingCount: increment(1) });

          /* Send notification to followed user */
          await sendFollowNotification();

          isFollowing = true;
          btn.textContent = "✓ Following";
          btn.classList.add("following");
          const el = document.getElementById("followersCountEl");
          if (el) el.textContent = parseInt(el.textContent) + 1;
          showToast(`Now following ${targetProfile.name}!`);
        }
      } catch (err) {
        console.error("toggleFollow:", err);
        showToast("Action failed. Try again.");
      } finally {
        btn.disabled = false;
      }
    }

    /* ── Notification: follow ────────────────────────────────── */
    async function sendFollowNotification() {
      try {
        const notifRef = doc(
          collection(db, "notifications", targetUid, "items")
        );
        await setDoc(notifRef, {
          type:      "follow",
          fromUid:   currentUser.uid,
          fromName:  currentProfile?.name || "Someone",
          timestamp: serverTimestamp(),
          read:      false
        });
      } catch { /* silent fail */ }
    }

    /* ── Load followers list ─────────────────────────────────── */
    async function loadFollowersList() {
      const list = document.getElementById("followersList");
      if (!list || list.dataset.loaded) return;
      list.dataset.loaded = "1";
      list.innerHTML = `<div class="follow-list-empty">Loading…</div>`;

      try {
        const q    = query(collection(db, "follows"), where("followingId", "==", targetUid));
        const snap = await getDocs(q);

        if (snap.empty) {
          list.innerHTML = `<div class="follow-list-empty">No followers yet.</div>`;
          return;
        }

        list.innerHTML = "";
        const promises = snap.docs.map(async d => {
          const followerId = d.data().followerId;
          const uSnap = await getDoc(doc(db, "users", followerId));
          if (!uSnap.exists()) return null;
          const u = uSnap.data();
          return buildUserRow(followerId, u);
        });
        const rows = await Promise.all(promises);
        rows.forEach(r => { if (r) list.appendChild(r); });

      } catch (err) {
        list.innerHTML = `<div class="follow-list-empty">Failed to load.</div>`;
      }
    }

    /* ── Load following list ─────────────────────────────────── */
    async function loadFollowingList() {
      const list = document.getElementById("followingList");
      if (!list || list.dataset.loaded) return;
      list.dataset.loaded = "1";
      list.innerHTML = `<div class="follow-list-empty">Loading…</div>`;

      try {
        const q    = query(collection(db, "follows"), where("followerId", "==", targetUid));
        const snap = await getDocs(q);

        if (snap.empty) {
          list.innerHTML = `<div class="follow-list-empty">Not following anyone yet.</div>`;
          return;
        }

        list.innerHTML = "";
        const promises = snap.docs.map(async d => {
          const followingId = d.data().followingId;
          const uSnap = await getDoc(doc(db, "users", followingId));
          if (!uSnap.exists()) return null;
          const u = uSnap.data();
          return buildUserRow(followingId, u);
        });
        const rows = await Promise.all(promises);
        rows.forEach(r => { if (r) list.appendChild(r); });

      } catch (err) {
        list.innerHTML = `<div class="follow-list-empty">Failed to load.</div>`;
      }
    }

    /* ── Build a user row (followers/following) ──────────────── */
    function buildUserRow(uid, u) {
      const row = document.createElement("a");
      row.href  = `profile.html?user=${uid}`;
      row.className = "follow-user-row";
      row.innerHTML = `
        <div class="follow-user-avatar">
          ${u.photoURL
            ? `<img src="${esc(u.photoURL)}" alt="${esc(u.name)}" />`
            : (u.name || "?")[0].toUpperCase()
          }
        </div>
        <div>
          <div class="follow-user-name">${esc(u.name)}</div>
          <div class="follow-user-role">${esc(u.role || "")}</div>
        </div>`;
      return row;
    }

    /* ── Refresh avatar UI after upload ──────────────────────── */
    function _refreshAvatarUI(photoURL, name) {
      const wrap = document.getElementById("profileAvatarWrap");
      if (!wrap) return;

      /* Remove old img / initials (keep ring + overlay) */
      wrap.querySelector(".profile-avatar")?.remove();
      wrap.querySelector(".profile-avatar-initials")?.remove();
      wrap.querySelector(".avatar-uploading-ring")?.remove();

      const initials = (name || "?")[0].toUpperCase();

      if (photoURL) {
        const img = document.createElement("img");
        img.className = "profile-avatar";
        img.id        = "profileAvatarImg";
        img.src       = photoURL;
        img.alt       = name || "";
        img.onerror   = () => {
          img.remove();
          const d = document.createElement("div");
          d.className = "profile-avatar-initials";
          d.id        = "profileAvatarInitials";
          d.textContent = initials;
          wrap.insertBefore(d, wrap.querySelector(".avatar-edit-overlay"));
        };
        /* Insert before overlay so overlay stays on top */
        const overlay = wrap.querySelector(".avatar-edit-overlay");
        wrap.insertBefore(img, overlay || null);
      } else {
        const d = document.createElement("div");
        d.className   = "profile-avatar-initials";
        d.id          = "profileAvatarInitials";
        d.textContent = initials;
        const overlay = wrap.querySelector(".avatar-edit-overlay");
        wrap.insertBefore(d, overlay || null);
      }
    }

    /* ── Avatar upload modal ─────────────────────────────────── */
    const CLOUD_NAME    = "dsbsinbun";
    const UPLOAD_PRESET = "ml_default";
    const MAX_IMG_SIZE  = 5 * 1024 * 1024;

    function _showAvatarModal() {
      document.getElementById("avatarUploadModal")?.remove();

      const current  = targetProfile?.photoURL || null;
      const name     = targetProfile?.name || "?";
      const initials = name[0].toUpperCase();
      let   _staged  = null;
      let   _objURL  = null;

      const overlay = document.createElement("div");
      overlay.id        = "avatarUploadModal";
      overlay.style.cssText = `
        position:fixed;inset:0;background:rgba(0,0,0,0.72);
        z-index:9000;display:flex;align-items:center;justify-content:center;
        padding:1rem;animation:fadeIn .18s ease;
      `;

      overlay.innerHTML = `
        <style>@keyframes fadeIn{from{opacity:0}to{opacity:1}}</style>
        <div style="
          background:var(--bg,#f9f6f1);border-radius:20px;
          width:min(400px,100%);padding:2rem;position:relative;
          display:flex;flex-direction:column;align-items:center;gap:1.1rem;
          box-shadow:0 24px 80px rgba(0,0,0,.3);
        ">
          <button id="avClose" style="
            position:absolute;top:.85rem;right:.85rem;width:28px;height:28px;
            border-radius:50%;border:1px solid var(--border,rgba(0,0,0,.1));
            background:transparent;color:var(--text-muted,#7a736b);
            cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;
          ">✕</button>

          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--text,#1a1613);">
            Update Profile Photo
          </h2>

          <!-- Preview -->
          <div id="avPreviewWrap" style="position:relative;width:100px;height:100px;flex-shrink:0;">
            ${current
              ? `<img id="avPreview" src="${esc(current)}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--accent,#c8a96e);display:block;" />`
              : `<div id="avPreview" style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent,#c8a96e),#8b5e3c);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;color:#fff;border:3px solid var(--accent,#c8a96e);">${initials}</div>`
            }
          </div>

          <!-- Drop zone -->
          <div id="avDropzone" style="
            width:100%;border:2px dashed var(--border,rgba(0,0,0,.12));
            border-radius:12px;padding:1.1rem 1rem;text-align:center;
            cursor:pointer;color:var(--text-muted,#7a736b);transition:all .2s ease;
          ">
            <input type="file" id="avFileInput" accept="image/*" hidden />
            <div style="font-size:1.5rem;margin-bottom:.25rem;">📷</div>
            <div style="font-size:.82rem;line-height:1.5;">
              Click to choose or drag & drop<br/>
              <span style="font-size:.7rem;opacity:.7;">JPG · PNG · GIF · WebP · Max 5 MB</span>
            </div>
          </div>

          <!-- Progress -->
          <div id="avProgressWrap" style="width:100%;height:4px;background:var(--border,rgba(0,0,0,.08));border-radius:2px;overflow:hidden;display:none;">
            <div id="avProgressBar" style="height:100%;background:var(--accent,#c8a96e);width:0%;transition:width .15s ease;"></div>
          </div>

          <p id="avStatus" style="font-size:.8rem;color:var(--text-muted,#7a736b);text-align:center;min-height:1.1em;"></p>

          <!-- Buttons -->
          <div style="display:flex;gap:.7rem;width:100%;">
            <button id="avSaveBtn" disabled style="
              flex:1;padding:.6rem 1rem;border-radius:50px;
              background:var(--accent,#c8a96e);color:#fff;border:none;
              font-family:'Jost',sans-serif;font-size:.88rem;font-weight:500;
              cursor:pointer;transition:all .2s ease;opacity:.5;
            ">Save Photo</button>
            ${current
              ? `<button id="avRemoveBtn" style="
                  padding:.6rem 1rem;border-radius:50px;background:transparent;
                  color:#e74c3c;border:1.5px solid #e74c3c33;
                  font-family:'Jost',sans-serif;font-size:.85rem;cursor:pointer;
                  transition:all .2s ease;">Remove</button>`
              : ""
            }
          </div>
        </div>`;

      document.body.appendChild(overlay);

      const closeBtn     = overlay.querySelector("#avClose");
      const dropzone     = overlay.querySelector("#avDropzone");
      const fileInput    = overlay.querySelector("#avFileInput");
      const saveBtn      = overlay.querySelector("#avSaveBtn");
      const removeBtn    = overlay.querySelector("#avRemoveBtn");
      const statusEl     = overlay.querySelector("#avStatus");
      const progressWrap = overlay.querySelector("#avProgressWrap");
      const progressBar  = overlay.querySelector("#avProgressBar");
      const previewWrap  = overlay.querySelector("#avPreviewWrap");

      const _close = () => { if (_objURL) URL.revokeObjectURL(_objURL); overlay.remove(); };
      closeBtn.addEventListener("click", _close);
      overlay.addEventListener("click", e => { if (e.target === overlay) _close(); });

      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", e => {
        e.preventDefault();
        dropzone.style.borderColor = "var(--accent,#c8a96e)";
        dropzone.style.background  = "rgba(200,169,110,.05)";
      });
      dropzone.addEventListener("dragleave", () => {
        dropzone.style.borderColor = "";
        dropzone.style.background  = "";
      });
      dropzone.addEventListener("drop", e => {
        e.preventDefault();
        dropzone.style.borderColor = "";
        dropzone.style.background  = "";
        const f = e.dataTransfer.files?.[0];
        if (f) _stage(f);
      });
      fileInput.addEventListener("change", e => {
        const f = e.target.files?.[0];
        if (f) _stage(f);
        fileInput.value = "";
      });

      function _stage(file) {
        if (!file.type.startsWith("image/")) {
          statusEl.textContent = "Only image files allowed.";
          statusEl.style.color = "#e74c3c";
          return;
        }
        if (file.size > MAX_IMG_SIZE) {
          statusEl.textContent = "Image must be under 5 MB.";
          statusEl.style.color = "#e74c3c";
          return;
        }
        _staged = file;
        if (_objURL) URL.revokeObjectURL(_objURL);
        _objURL = URL.createObjectURL(file);
        previewWrap.innerHTML = `<img src="${_objURL}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--accent,#c8a96e);display:block;" />`;
        saveBtn.disabled      = false;
        saveBtn.style.opacity = "1";
        statusEl.textContent  = `Ready: ${file.name}`;
        statusEl.style.color  = "var(--text-muted,#7a736b)";
      }

      saveBtn.addEventListener("click", async () => {
        if (!_staged) return;
        saveBtn.disabled     = true;
        saveBtn.style.opacity = ".5";
        progressWrap.style.display = "block";
        statusEl.textContent = "Uploading…";
        statusEl.style.color = "var(--text-muted,#7a736b)";

        /* Show spinner on avatar */
        const wrap = document.getElementById("profileAvatarWrap");
        const ring = document.createElement("div");
        ring.className = "avatar-uploading-ring";
        wrap?.appendChild(ring);

        try {
          const url = await _uploadAvatar(_staged, pct => {
            progressBar.style.width = pct + "%";
          });
          await updateDoc(doc(db, "users", currentUser.uid), { photoURL: url });
          targetProfile.photoURL = url;
          ring.remove();
          progressWrap.style.display = "none";
          statusEl.textContent = "Photo updated! ✓";
          statusEl.style.color = "#27ae60";
          showToast("Profile photo updated! 📸");
          _close();
        } catch (err) {
          ring.remove();
          progressWrap.style.display = "none";
          saveBtn.disabled     = false;
          saveBtn.style.opacity = "1";
          statusEl.textContent = err.message || "Upload failed.";
          statusEl.style.color = "#e74c3c";
        }
      });

      removeBtn?.addEventListener("click", async () => {
        if (!confirm("Remove your profile photo?")) return;
        removeBtn.disabled = true;
        try {
          await updateDoc(doc(db, "users", currentUser.uid), { photoURL: null });
          targetProfile.photoURL = null;
          showToast("Profile photo removed.");
          _close();
        } catch {
          removeBtn.disabled = false;
          statusEl.textContent = "Failed to remove photo.";
          statusEl.style.color = "#e74c3c";
        }
      });
    }

    /* ── Cloudinary upload ───────────────────────────────────── */
    function _uploadAvatar(file, onProgress) {
      return new Promise((resolve, reject) => {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", UPLOAD_PRESET);
        const xhr = new XMLHttpRequest();
        xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
        };
        xhr.onload = () => {
          if (xhr.status === 200) {
            const d = JSON.parse(xhr.responseText);
            d.secure_url ? resolve(d.secure_url) : reject(new Error("No URL returned."));
          } else {
            reject(new Error("Upload failed (status " + xhr.status + ")."));
          }
        };
        xhr.onerror = () => reject(new Error("Network error."));
        xhr.send(fd);
      });
    }

    /* ── Story ring on profile page ──────────────────────────── */
    async function _loadStoryRing() {
      const ring       = document.getElementById("profileStoryRing");
      const btnWrap    = document.getElementById("viewStoryBtnWrap");
      const avatarWrap = document.getElementById("profileAvatarWrap");
      if (!ring || !targetUid) return;

      const STORY_TTL = 24 * 60 * 60 * 1000;

      try {
        const { getDocs: gd, collection: col, query: q, orderBy: ob } =
          await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js");

        const snap = await gd(q(
          col(db, "stories", targetUid, "items"),
          ob("createdAt", "asc")
        ));

        if (snap.empty) return;

        /* Filter to active (non-expired) stories */
        const active = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(s => {
            const exp = s.expiresAt?.toDate?.()?.getTime?.() || 0;
            return Date.now() < exp;
          });

        if (!active.length) return;

        /* Check if current user has seen all */
        const allSeen = active.every(
          s => Array.isArray(s.seenBy) && s.seenBy.includes(currentUser?.uid)
        );

        /* Animate ring */
        ring.classList.add(allSeen ? "has-stories-seen" : "has-stories");

        /* Build inline viewer for profile page stories */
        const _openProfileStories = () => _viewProfileStories(
          targetUid,
          active,
          targetProfile.name,
          targetProfile.photoURL || null
        );

        /* Clicking the ring opens the viewer */
        ring.addEventListener("click", _openProfileStories);
        avatarWrap?.addEventListener("click", e => {
          /* Only fire from the ring itself, not the avatar photo */
          if (e.target === ring) _openProfileStories();
        });

        /* "View Story" button in actions row (only for others' profiles) */
        if (btnWrap && currentUser?.uid !== targetUid) {
          const btn = document.createElement("button");
          btn.className   = "btn-view-story";
          btn.innerHTML   = `✦ ${active.length} ${active.length === 1 ? "Story" : "Stories"}`;
          btn.addEventListener("click", _openProfileStories);
          btnWrap.appendChild(btn);
        }

      } catch (err) {
        console.warn("_loadStoryRing:", err);
      }
    }

    /* Inline story viewer used from profile page
       (mirrors features/stories.js viewer but self-contained) */
    function _viewProfileStories(uid, stories, name, photoURL) {
      let idx          = 0;
      let timer        = null;
      let touchStartX  = 0;
      const DURATION   = 5000;
      const BG_FALLBACK = "linear-gradient(135deg,#c8a96e,#8b5e3c)";

      function _timeAgo(date) {
        if (!date) return "";
        const diff = Math.floor((Date.now() - date.getTime()) / 1000);
        if (diff < 60)   return "just now";
        if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
        return `${Math.floor(diff/3600)}h ago`;
      }

      function render() {
        document.getElementById("pStoryViewer")?.remove();
        clearTimeout(timer);
        if (idx >= stories.length) { close(); return; }

        const s        = stories[idx];
        const isOwn    = uid === currentUser?.uid;
        const seenBy   = Array.isArray(s.seenBy) ? s.seenBy : [];
        const initials = (name || "?")[0].toUpperCase();

        const segs = stories.map((_, i) => {
          let cls = "story-progress-fill";
          if (i < idx)  cls += " story-progress-fill--done";
          if (i === idx) cls += " story-progress-fill--active";
          return `<div class="story-progress-segment">
            <div class="${cls}" ${i===idx?`style="--story-duration:${DURATION/1000}s"`:""}></div>
          </div>`;
        }).join("");

        let bgHTML = "";
        if (s.type === "text") {
          bgHTML = `<div class="story-slide__bg">
            <div class="story-slide__text-bg" style="background:${esc(s.bg||BG_FALLBACK)}">
              <p>${esc(s.content||"")}</p>
            </div></div>`;
        } else if (s.type === "image") {
          bgHTML = `<div class="story-slide__bg"><img src="${esc(s.mediaUrl)}" alt="Story"/></div>`;
        } else {
          bgHTML = `<div class="story-slide__bg"><video src="${esc(s.mediaUrl)}" autoplay muted playsinline loop></video></div>`;
        }

        const ov = document.createElement("div");
        ov.id        = "pStoryViewer";
        ov.className = "story-viewer-overlay";
        ov.innerHTML = `
          <div class="story-slide" id="psvSlide">
            ${bgHTML}
            <div class="story-viewer__topbar">
              <div class="story-progress-bars">${segs}</div>
              <div class="story-viewer__header-row">
                <div class="story-viewer__avatar">
                  ${photoURL
                    ? `<img src="${esc(photoURL)}" alt="${esc(name)}" onerror="this.remove()"/>`
                    : initials}
                </div>
                <span class="story-viewer__name">${esc(name)}</span>
                <span class="story-viewer__time">${_timeAgo(s.createdAt?.toDate?.())}</span>
                <button class="story-viewer__close" id="psvClose">✕</button>
              </div>
            </div>
            <div class="story-tap-prev" id="psvPrev"></div>
            <div class="story-tap-next" id="psvNext"></div>
            ${isOwn ? `
              <div class="story-viewer__seen">👁 ${seenBy.filter(u=>u!==currentUser?.uid).length} views</div>
              <button class="story-viewer__delete" id="psvDelete">🗑 Delete</button>
            ` : ""}
          </div>`;

        document.body.appendChild(ov);

        /* Mark seen */
        if (!isOwn && !seenBy.includes(currentUser?.uid)) {
          import("https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js")
            .then(({ updateDoc: upd, doc: fd, arrayUnion: au }) => {
              upd(fd(db, "stories", uid, "items", s.id), { seenBy: au(currentUser.uid) })
                .catch(()=>{});
            });
          stories[idx].seenBy = [...seenBy, currentUser.uid];
        }

        ov.querySelector("#psvClose")?.addEventListener("click", close);
        ov.querySelector("#psvPrev")?.addEventListener("click", prev);
        ov.querySelector("#psvNext")?.addEventListener("click", next);

        const onKey = e => {
          if (e.key==="ArrowRight"||e.key===" ") next();
          if (e.key==="ArrowLeft") prev();
          if (e.key==="Escape") close();
        };
        document.addEventListener("keydown", onKey);
        ov.querySelector("#psvClose")?.addEventListener("click",
          () => document.removeEventListener("keydown", onKey));

        ov.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive:true });
        ov.addEventListener("touchend",   e => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx)>50) dx<0 ? next() : prev();
        }, { passive:true });

        /* Press-and-hold pause */
        const slide = ov.querySelector("#psvSlide");
        slide?.addEventListener("pointerdown", () => {
          clearTimeout(timer);
          const f = ov.querySelector(".story-progress-fill--active");
          if (f) f.style.animationPlayState = "paused";
        });
        slide?.addEventListener("pointerup", () => {
          const f = ov.querySelector(".story-progress-fill--active");
          if (f) f.style.animationPlayState = "running";
          timer = setTimeout(next, DURATION);
        });

        ov.querySelector("#psvDelete")?.addEventListener("click", async () => {
          if (!confirm("Delete this story?")) return;
          try {
            const { deleteDoc: dd, doc: fd } =
              await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js");
            await dd(fd(db, "stories", currentUser.uid, "items", s.id));
            stories.splice(idx, 1);
            if (!stories.length) { close(); return; }
            if (idx >= stories.length) idx--;
            render();
          } catch { showToast("Failed to delete story."); }
        });

        timer = setTimeout(next, DURATION);
      }

      function next() { clearTimeout(timer); idx++; render(); }
      function prev() { clearTimeout(timer); idx = Math.max(0, idx-1); render(); }
      function close() {
        clearTimeout(timer);
        document.getElementById("pStoryViewer")?.remove();
      }

      render();
    }

  </script>
